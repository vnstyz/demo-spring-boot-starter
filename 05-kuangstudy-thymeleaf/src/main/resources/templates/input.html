<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${employee.id} != null ? '编辑员工' : '新增员工'">员工表单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-body-tertiary">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white">
                    <h5 class="mb-0" th:text="${employee.id} != null ? '编辑员工信息' : '新增员工信息'">编辑员工信息</h5>
                </div>
                <div class="card-body">
                    <!-- [MOD-FORM] Bootstrap 风格表单 -->
                    <form th:action="@{/employee/save}" method="post" th:object="${employee}">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">姓名</label>
                            <input type="text" class="form-control" th:field="*{lastName}" maxlength="30" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block">性别</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" id="genderMale" th:field="*{gender}" value="1" required>
                                <label class="form-check-label" for="genderMale">男</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" id="genderFemale" th:field="*{gender}" value="0" required>
                                <label class="form-check-label" for="genderFemale">女</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" class="form-control" th:field="*{email}" maxlength="60" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">部门</label>
                            <select class="form-select" th:field="*{department}" required>
                                <option value="">请选择部门</option>
                                <option value="101">101</option>
                                <option value="102">102</option>
                                <option value="103">103</option>
                                <option value="104">104</option>
                                <option value="105">105</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">生日</label>
                            <input type="date" class="form-control" th:field="*{birth}" required>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> 返回列表
                            </a>
                            <button type="submit" class="btn btn-primary"
                                    th:text="${employee.id} != null ? '保存修改' : '创建员工'">保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
